apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: signspeak-backend
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 3600  # 1 hour for long WebSocket sessions
      containers:
        - image: gcr.io/PROJECT_ID/signspeak-backend
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
            - name: GOOGLE_CLOUD_PROJECT
              value: "PROJECT_ID"
