<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">SignSpeak Architecture Diagram</title>
  <desc id="desc">Architecture diagram showing a React frontend communicating with a FastAPI backend on Cloud Run, Gemini models via Google GenAI SDK, Secret Manager, and Google Cloud Text-to-Speech.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe6" />
      <stop offset="100%" stop-color="#e5f3ee" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafb" />
    </linearGradient>
    <style>
      .title { font: 700 34px 'Arial', sans-serif; fill: #183b2b; }
      .subtitle { font: 400 18px 'Arial', sans-serif; fill: #35594b; }
      .cardTitle { font: 700 24px 'Arial', sans-serif; fill: #173727; }
      .cardText { font: 400 16px 'Arial', sans-serif; fill: #3b5649; }
      .label { font: 700 15px 'Arial', sans-serif; fill: #315443; letter-spacing: 0.08em; }
      .small { font: 400 14px 'Arial', sans-serif; fill: #587166; }
      .arrow { stroke: #305746; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .box { fill: url(#card); stroke: #9ab7a9; stroke-width: 2; rx: 24; }
      .accent { fill: #dceee5; stroke: #7ea38f; stroke-width: 2; rx: 18; }
      .cloud { fill: #eef7f3; stroke: #76a08b; stroke-width: 2; rx: 28; }
      .pill { fill: #183b2b; }
      .pillText { font: 700 13px 'Arial', sans-serif; fill: #ffffff; letter-spacing: 0.05em; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#305746" />
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />

  <text x="70" y="76" class="title">SignSpeak System Architecture</text>
  <text x="70" y="108" class="subtitle">Real-time sign and speech interpretation with Gemini on Google Cloud</text>

  <rect x="70" y="170" width="300" height="360" class="box" />
  <text x="100" y="218" class="cardTitle">Frontend</text>
  <text x="100" y="248" class="cardText">React + TypeScript + Vite</text>
  <text x="100" y="286" class="cardText">• Webcam capture</text>
  <text x="100" y="316" class="cardText">• Microphone capture</text>
  <text x="100" y="346" class="cardText">• WebSocket conversation UI</text>
  <text x="100" y="376" class="cardText">• Translation overlays</text>
  <text x="100" y="406" class="cardText">• MediaPipe hand landmarks</text>
  <rect x="100" y="440" width="146" height="34" rx="17" class="pill" />
  <text x="128" y="462" class="pillText">browser session</text>

  <rect x="490" y="150" width="340" height="410" class="cloud" />
  <text x="520" y="198" class="label">GOOGLE CLOUD</text>
  <text x="520" y="238" class="cardTitle">Cloud Run Backend</text>
  <text x="520" y="268" class="cardText">FastAPI + WebSockets</text>
  <text x="520" y="308" class="cardText">• Session management</text>
  <text x="520" y="338" class="cardText">• Frame batching for sign turns</text>
  <text x="520" y="368" class="cardText">• Audio buffering for speech turns</text>
  <text x="520" y="398" class="cardText">• Prompt assembly with conversation history</text>
  <text x="520" y="428" class="cardText">• Optional server TTS response</text>
  <rect x="520" y="465" width="135" height="34" rx="17" class="pill" />
  <text x="551" y="487" class="pillText">Cloud Run</text>

  <rect x="920" y="130" width="280" height="170" class="accent" />
  <text x="950" y="178" class="cardTitle">Gemini</text>
  <text x="950" y="208" class="cardText">Google GenAI SDK</text>
  <text x="950" y="246" class="cardText">• Gemini 2.5 Flash</text>
  <text x="950" y="276" class="cardText">• Gemini Live audio model</text>

  <rect x="920" y="340" width="280" height="110" class="accent" />
  <text x="950" y="388" class="cardTitle">Secret Manager</text>
  <text x="950" y="418" class="cardText">Stores `GEMINI_API_KEY`</text>

  <rect x="920" y="490" width="280" height="120" class="accent" />
  <text x="950" y="538" class="cardTitle">Cloud Text-to-Speech</text>
  <text x="950" y="568" class="cardText">Generates spoken responses</text>

  <path d="M370 350 C420 350, 440 350, 490 350" class="arrow" marker-end="url(#arrowHead)" />
  <path d="M830 225 C870 225, 880 215, 920 215" class="arrow" marker-end="url(#arrowHead)" />
  <path d="M830 395 C870 395, 880 395, 920 395" class="arrow" marker-end="url(#arrowHead)" />
  <path d="M830 545 C870 545, 880 545, 920 545" class="arrow" marker-end="url(#arrowHead)" />

  <text x="382" y="332" class="small">video frames, audio chunks, UI events</text>
  <text x="383" y="373" class="small">translations, status, audio responses</text>

  <text x="855" y="198" class="small">multimodal prompts</text>
  <text x="847" y="388" class="small">API key injection</text>
  <text x="842" y="538" class="small">optional voice synthesis</text>

  <rect x="70" y="590" width="1130" height="80" class="box" />
  <text x="100" y="635" class="cardText">Flow: Browser captures sign video and speech audio → Cloud Run batches and contextualizes the turn → Gemini interprets the input → backend returns text and optional TTS audio to the UI.</text>
</svg>
